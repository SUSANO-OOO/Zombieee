name: PR31 Merge Release Package

on:
  push:
    branches:
      - qa/pr31-source-export-20260716

permissions:
  contents: read

jobs:
  package-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact merged release SHA
        uses: actions/checkout@v4
        with:
          ref: aa655937abbeca529d6b2fc1d50b2a17bb630f4f
          persist-credentials: false
          fetch-depth: 1
      - name: Verify release source identity
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "aa655937abbeca529d6b2fc1d50b2a17bb630f4f"
          test "$(git status --porcelain)" = ""
          printf '%s\n' "$actual" > "$RUNNER_TEMP/release-source-sha.txt"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Build exact merged release
        run: npm run build
      - name: Verify and package conventional Sites artifact
        shell: bash
        run: |
          set -euo pipefail
          test -d dist/client
          test -f dist/server/index.js
          test -f dist/.openai/hosting.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const hosting = JSON.parse(fs.readFileSync("dist/.openai/hosting.json", "utf8"));
          if (hosting.project_id !== "appgprj_6a520bfa47cc8191ae9de457455ecd42") {
            throw new Error(`Unexpected Sites project_id: ${hosting.project_id}`);
          }
          if (hosting.d1 !== null || hosting.r2 !== null) {
            throw new Error("Unexpected Sites binding configuration");
          }
          NODE
          archive="$RUNNER_TEMP/sites-release-aa655937.tgz"
          tar -czf "$archive" dist/client dist/server dist/.openai
          tar -tzf "$archive" > "$RUNNER_TEMP/sites-release-aa655937.contents.txt"
          if grep -Ev '^(dist/client(/|$)|dist/server(/|$)|dist/\.openai(/|$))' "$RUNNER_TEMP/sites-release-aa655937.contents.txt" | grep -q .; then
            echo "Unexpected path in release archive" >&2
            exit 1
          fi
          sha256sum "$archive" | tee "$RUNNER_TEMP/sites-release-aa655937.sha256"
          {
            echo "release_sha=aa655937abbeca529d6b2fc1d50b2a17bb630f4f"
            echo "project_id=appgprj_6a520bfa47cc8191ae9de457455ecd42"
            echo "archive_bytes=$(stat -c %s "$archive")"
            echo "archive_entries=$(wc -l < "$RUNNER_TEMP/sites-release-aa655937.contents.txt")"
            echo "client_files=$(find dist/client -type f | wc -l)"
            echo "server_files=$(find dist/server -type f | wc -l)"
          } | tee "$RUNNER_TEMP/sites-release-aa655937.manifest.txt"
      - name: Upload exact Sites release package
        uses: actions/upload-artifact@v4
        with:
          name: sites-release-aa655937
          path: |
            ${{ runner.temp }}/sites-release-aa655937.tgz
            ${{ runner.temp }}/sites-release-aa655937.sha256
            ${{ runner.temp }}/sites-release-aa655937.contents.txt
            ${{ runner.temp }}/sites-release-aa655937.manifest.txt
            ${{ runner.temp }}/release-source-sha.txt
          if-no-files-found: error
          retention-days: 3
