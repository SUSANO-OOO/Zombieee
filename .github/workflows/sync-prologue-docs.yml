name: Integrate prologue v5

on:
  push:
    branches:
      - feat/0.6.0-early-access-foundation

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Integrate approved story, UI, and dialogue
        shell: bash
        run: |
          git pull --ff-only origin "$GITHUB_REF_NAME"
          python - <<'PY'
          from pathlib import Path

          implementation = Path("docs/CODEX_IMPLEMENTATION_MISSION_0.6.0_FINAL.md")
          text = implementation.read_text(encoding="utf-8")
          start = text.index("## 2. 実装範囲")
          end = text.index("## 3. キャラクター")
          section = '''## 2. 実装範囲

          `docs/SCENARIO_0.6.0_COMPLETE.md`の開始から最終暗転までをすべて実装する。

          - タイトル前の早良区役所救難信号と不自然な反復
          - 移動拠点の作戦前会話
          - 西新商店街の戦闘前会話
          - 西新商店街の全戦闘中通信
          - 西新商店街の戦闘後会話、生存者三名の救出、クレイジーキングと大庭豪の加入
          - 早良区役所の戦闘前会話
          - 早良区役所の全戦闘中通信
          - 早良区役所の戦闘後会話、救援車両撤収、瓦礫下負傷者の救助、三名の加入
          - 西新防衛線の戦闘前会話
          - 西新防衛線の全戦闘中通信
          - 人間の声をまねる感染体とTAKUYAの各戦闘段階
          - TAKUYA撃破後の感染拠点攻略と偽救難音声の停止
          - 西新・早良区間の主要避難経路確保
          - 百道浜から届く新しい生の救難信号
          - パイセンによる無線応答、百道浜への進路変更、最終暗転、`序章　完`
          - 全キャラクターの戦闘中ランダム台詞

          旧名、登録名、過去の撃破班、現行人物と一致する古い記録、未来からの警告、周回数、時間ループを示す追加演出は実装しない。感染原因とTAKUYAの名称由来も0.6.0では確定しない。

          会話を戦闘前後だけに置かず、指定された戦闘条件・敵種・ボス状態・感染拠点露出・戦闘結果へ接続する。

          '''
          section = "\n".join(line.removeprefix("          ") for line in section.splitlines()) + "\n"
          implementation.write_text(text[:start] + section + text[end:], encoding="utf-8", newline="\n")

          rework = Path("docs/CODEX_REWORK_MISSION_0.6.0.md")
          text = rework.read_text(encoding="utf-8")
          start = text.index("## 3. シナリオ設計")
          end = text.index("## 4. 会話画面")
          section = '''## 3. シナリオ設計

          物語、人物像、台詞、場面順、加入理由、終幕は`docs/SCENARIO_0.6.0_COMPLETE.md`だけを正本とする。`app/storyEvents.js`と戦闘中通信は同書へ一致させ、Codexが場当たり的に台詞や伏線を追加しない。

          ### 序章の因果関係

          1. 早良区役所から最初の生の救難信号が届き、その後に同じ音声が不自然に反復する。
          2. 区役所へ向かう唯一の現実的な経路として西新商店街を突破する。
          3. 商店街で薬局屋上の大人二名と子ども一名を救い、クレイジーキングと大庭豪が行動と本人の意思から同行する。
          4. 早良区役所で避難民と救援車両を守り、瓦礫下の負傷者を救助する判断の衝突を描く。
          5. 無人の西新防衛線から区役所と同じ声が流れているため、次の犠牲者を止める目的で防衛線へ向かう。
          6. 人間の声をまねる感染体、TAKUYA、奥の感染拠点を順に排除し、偽の救難音声を停止する。
          7. 西新・早良区間の主要避難経路を確保した直後、百道浜から新しい生の救難信号が届く。
          8. パイセンが自分から応答し、一行が百道浜へ向かうところで序章を終える。

          ### 追加禁止

          - 現在の人物名や呼び名を古い記録へ残す設定
          - 旧名や登録名による人物証明
          - 現行部隊が以前に全滅していたと断定する設定
          - TAKUYAの過去撃破記録や名称由来の独自説明
          - 未来の人物から届く警告
          - 周回回数、時間ループ、同じ出来事の反復を確定する表示
          - 感染原因の独自確定

          環境、音、敵の動き、放棄された装備は世界の被害を示すために使えるが、上記の廃止設定を復活させる証拠として使わない。

          ### 台詞原則

          - 台詞は相手への質問、反応、制止、判断、依頼として発生させる。
          - 質問には答えを返し、格好いい別台詞へ逃げない。
          - 同じ情報を複数人が順番に説明しない。
          - 遮り、聞き返し、沈黙、言い直し、判断の衝突を自然に使う。
          - 全員を同じ軍人口調や常に正しい人物へ均一化しない。
          - 一台詞は原則一〜二文とし、戦闘中はさらに短くする。
          - パイセン、クマバーソン、ババヤガの口調と固定台詞は正本を厳守する。
          - クマバーソンの博多弁を語尾の乱用にしない。
          - ババヤガの意味不明発言は文法を崩さず、本気の場面では冗談を止める。
          - クレイジーキングは罠、燃料管理、戦闘判断から人物像を見せる。
          - 不明な無線に人物画像を使用しない。

          '''
          section = "\n".join(line.removeprefix("          ") for line in section.splitlines()) + "\n"
          rework.write_text(text[:start] + section + text[end:], encoding="utf-8", newline="\n")

          screens = Path("app/CampaignScreens.tsx")
          text = screens.read_text(encoding="utf-8")
          old_import = 'import { getStoryEvent, storyEventLog } from "./storyEvents.js";'
          new_import = 'import { PROLOGUE_SYNOPSIS, getStoryEvent, storyEventLog } from "./storyEvents.js";'
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif new_import not in text:
              raise SystemExit("storyEvents import was not found")
          old_title = '    <p className="title-copy">三本の道。途切れた通信。まだ終わっていない街。</p>\n    <div className="title-actions">'
          new_title = '    <p className="title-copy">三本の道。途切れた通信。まだ終わっていない街。</p>\n    <section className="title-synopsis" aria-label="序章のあらすじ"><b>序章のあらすじ</b><p>{PROLOGUE_SYNOPSIS.short}</p></section>\n    <div className="title-actions">'
          if old_title in text:
              text = text.replace(old_title, new_title, 1)
          elif 'className="title-synopsis"' not in text:
              raise SystemExit("title insertion point was not found")
          screens.write_text(text, encoding="utf-8", newline="\n")

          css = Path("app/campaign.css")
          text = css.read_text(encoding="utf-8")
          synopsis_css = '''
          .title-synopsis { position:relative; z-index:1; width:min(620px,82%); padding:7px 12px; border:1px solid rgba(220,188,142,.2); border-left:3px solid #b94d32; background:rgba(7,10,11,.76); box-shadow:0 8px 20px rgba(0,0,0,.28); text-align:left; }
          .title-synopsis b { display:block; color:#d48752; font:900 8px/1 monospace; letter-spacing:.12em; }
          .title-synopsis p { margin:4px 0 0; color:#d2c2a8; font:700 clamp(8px,1vw,12px)/1.45 sans-serif; }
          @media (max-height:360px) {
            .title-screen-v060 { gap:5px; }
            .title-logo h1 { font-size:clamp(32px,7vw,55px); }
            .title-copy { display:none; }
            .title-synopsis { width:min(600px,82%); padding:5px 10px; }
            .title-synopsis p { margin-top:2px; line-height:1.3; }
            .title-actions { gap:3px; }
          }
          '''
          synopsis_css = "\n".join(line.removeprefix("          ") for line in synopsis_css.splitlines()).strip("\n") + "\n"
          if ".title-synopsis {" not in text:
              marker = '.title-copy { position:relative; z-index:1; margin:0; color:#a99a84; font:700 clamp(7px,.85vw,11px)/1.3 monospace; letter-spacing:.08em; }\n'
              if marker not in text:
                  raise SystemExit("title-copy CSS marker was not found")
              text = text.replace(marker, marker + synopsis_css, 1)
          css.write_text(text, encoding="utf-8", newline="\n")

          barks = Path("app/battleBarks.js")
          text = barks.read_text(encoding="utf-8")
          replacements = {
              "前、借りるぞ。": "前、行くっす！",
              "まだ拳は動く。": "まだ動けるっす。",
              "近い奴は任せろ。": "近いのは俺が止める！",
              "走る。遅れんなよ。": "先を見る。遅れないで。",
              "薄い道から抜く。": "上、空いてる。そっちへ行く。",
              "吐く前に落とす。": "吐く個体を先に。",
              "危険個体から狙う。": "危ないのから撃つ。",
              "傷は塞いだ。前を見て。": "傷は塞ぎました。前を見て。",
              "治療する。援護を。": "傷を見ます。周りをお願い。",
              "動ける。戦列へ戻って。": "立てます。無理なら言って。",
              "ここは俺が割る。": "ここは俺が開ける。",
              "重い奴から砕く。": "重いのは俺が止める。",
              "前を開ける。下がれ。": "前を開ける。少し下がってくれ。",
              "大型、縫い止める。": "大きいのを止めます。",
              "弾幕を張る。伏せて。": "撃ちます。伏せて！",
              "全経路、接敵。配置を維持。": "来ます。左右も見てください。",
              "次の群れが来ます。前線確認。": "次が来ます。前を確認して。",
              "反応増加。両端にも警戒を。": "数が増えました。両端も見て。",
              "味方が倒れた。周囲を確保して。": "一人倒れました。周りを空けて。",
              "一人倒れた。まだ近づくな。": "まだ近づかないで。敵が残っています。",
              "倒れた場所を覚えて。後で戻る。": "場所は見ています。今は前を。",
              "目が開いた。もう味方として見るな。": "目が開いた。もう近づかないで。",
              "移動拠点、外殻損傷。前線を戻して。": "移動拠点が削られています。戻って！",
              "拠点がもちません。接近個体を優先。": "拠点がもちません。近い敵から！",
              "巨大反応、来る。中央を空けて。": "来る。中央から離れて。",
              "あれがTAKUYA。頭を上げないで。": "あれがTAKUYA。前を見て。",
              "通常弾が浅い。撃ち続ける。": "効きが浅い。撃ち続ける。",
              "激昂してる。火線を重ねる。": "動きが荒い。正面を撃ちます。",
              "TAKUYA、沈黙。次は感染拠点。": "TAKUYAは止まった。奥へ進む。",
              "感染拠点が露出。今なら届きます。": "感染拠点が見えました。今なら届きます。",
              "防壁崩壊。感染拠点へ集中を。": "防壁が崩れました。奥へ集中して。",
              "目標まで開通。全火力を前へ。": "道が開きました。全員、前へ。",
              "戦闘反応、消失。全員、点呼を。": "反応が消えました。全員いますか。",
              "経路を確保。移動拠点へ帰還を。": "道は開きました。移動拠点へ戻って。",
              "拠点を維持できません。撤退を。": "移動拠点がもちません。撤退してください！",
              "作戦中止。生存者の離脱を優先。": "続けられません。生きて戻って。",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          barks.write_text(text, encoding="utf-8", newline="\n")

          paths = [implementation, rework, screens, css, barks]
          for path in paths:
              text = path.read_text(encoding="utf-8")
              cleaned = "\n".join(line.rstrip(" \t\r") for line in text.split("\n"))
              if not cleaned.endswith("\n"):
                  cleaned += "\n"
              path.write_text(cleaned, encoding="utf-8", newline="\n")

          combined = implementation.read_text(encoding="utf-8") + rework.read_text(encoding="utf-8")
          obsolete = [
              "九名の過去記録",
              "未来の水城奈々の警告",
              "再生回数 8",
              "TAKUYAは以前も撃破されている",
              "過去の撃破班記録に現行班と一致する名前",
          ]
          found = [phrase for phrase in obsolete if phrase in combined]
          if found:
              raise SystemExit(f"obsolete scenario instructions remain: {found}")
          if 'className="title-synopsis"' not in screens.read_text(encoding="utf-8"):
              raise SystemExit("title synopsis was not integrated")
          PY

      - name: Verify focused changes
        shell: bash
        run: |
          git diff --check
          node --check app/storyEvents.js
          node --check app/battleBarks.js
          node --test tests/story-events.test.mjs

      - name: Commit integrated prologue
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/CampaignScreens.tsx app/campaign.css app/battleBarks.js docs/CODEX_IMPLEMENTATION_MISSION_0.6.0_FINAL.md docs/CODEX_REWORK_MISSION_0.6.0.md
          git commit -m "feat: integrate prologue v5 into player experience"
          git push origin HEAD:"$GITHUB_REF_NAME"
