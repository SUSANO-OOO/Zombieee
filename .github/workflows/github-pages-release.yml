name: GitHub Pages Release

on:
  pull_request:
    paths:
      - ".github/workflows/github-pages-release.yml"
      - ".github/pages-release-request.json"
      - "app/**"
      - "public/**"
      - "scripts/build-github-pages.mjs"
      - "scripts/github-pages-smoke.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/github-pages-release.yml"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Annotated release tag or immutable commit to deploy"
        required: true
        type: string
      release_sha:
        description: "Commit SHA expected from release_ref and embedded in the release"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: github-pages-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release identity
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_REF: ${{ inputs.release_ref }}
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          release_ref="$PUSH_SHA"
          release_sha="$PUSH_SHA"
          requested=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_ref="$INPUT_RELEASE_REF"
            release_sha="$INPUT_RELEASE_SHA"
            requested=true
          elif [[ "$EVENT_NAME" == "push" ]] \
            && git diff --name-only "$PUSH_BEFORE" "$PUSH_SHA" -- \
              | grep -Fxq '.github/pages-release-request.json'; then
            if [[ ! -f .github/pages-release-request.json ]]; then
              echo "::error::.github/pages-release-request.json changed but is unavailable"
              exit 1
            fi
            release_ref="$(jq -er '.release_ref | select(type == "string" and length > 0)' .github/pages-release-request.json)"
            release_sha="$(jq -er '.release_sha | select(type == "string" and test("^[0-9a-f]{40}$"))' .github/pages-release-request.json)"
            requested=true
          fi

          if [[ "$requested" == "true" ]]; then
            actual_sha="$(git rev-list -n 1 "$release_ref")"
            if [[ -z "$actual_sha" ]]; then
              echo "::error::release_ref could not be resolved: $release_ref"
              exit 1
            fi
            if [[ "$actual_sha" != "$release_sha" ]]; then
              echo "::error::release_ref resolved to $actual_sha, expected $release_sha"
              exit 1
            fi
            git checkout --detach "$actual_sha"
          fi

          actual_checkout_sha="$(git rev-parse HEAD)"
          if [[ "$actual_checkout_sha" != "$release_sha" ]]; then
            echo "::error::checkout is $actual_checkout_sha, expected $release_sha"
            exit 1
          fi

          echo "release_ref=$release_ref" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "requested=$requested" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production application
        run: npm run build

      - name: Build GitHub Pages static release
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
          GITHUB_PAGES_RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        shell: bash
        run: |
          node --input-type=module --eval \
            "process.env.GITHUB_SHA = process.env.GITHUB_PAGES_RELEASE_SHA; await import('./scripts/build-github-pages.mjs')"

      - name: Verify GitHub Pages release identity
        if: steps.release.outputs.requested == 'true'
        shell: bash
        env:
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          grep -Fq "<meta name=\"github-pages-release\" content=\"$RELEASE_SHA\">" _site/index.html
          grep -Fq '<meta name="github-pages-base" content="/Zombieee/">' _site/index.html

      - name: Install isolated browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Run GitHub Pages browser smoke
        id: smoke
        continue-on-error: true
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
        shell: bash
        run: |
          mkdir -p pages-evidence
          set +e
          node scripts/github-pages-smoke.mjs > pages-evidence/smoke.log 2>&1
          status=$?
          set -e
          cat pages-evidence/smoke.log
          exit "$status"

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-release-evidence
          path: pages-evidence
          if-no-files-found: error
          retention-days: 7

      - name: Report browser smoke failure
        if: steps.smoke.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "## GitHub Pages browser smoke failure"
            echo
            echo '```text'
            tail -n 100 pages-evidence/smoke.log
            echo '```'
          } > /tmp/pages-smoke-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pages-smoke-comment.md

      - name: Enforce browser smoke result
        if: steps.smoke.outcome == 'failure'
        run: exit 1

      - name: Verify GitHub Pages uses Actions
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const response = await github.request(
              'GET /repos/{owner}/{repo}/pages',
              { owner, repo },
            );
            if (response.data.build_type !== 'workflow') {
              core.setFailed(
                `GitHub Pages build_type is ${response.data.build_type}; expected workflow.`,
              );
            } else {
              core.info('GitHub Pages exists and uses the workflow build type.');
            }

      - name: Configure GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
