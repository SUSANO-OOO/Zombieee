name: GitHub Pages Playtest

on:
  pull_request:
    paths:
      - ".github/workflows/github-pages-playtest.yml"
      - "app/**"
      - "public/**"
      - "scripts/build-github-pages.mjs"
      - "scripts/github-pages-smoke.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Build production application
        run: npm run build
      - name: Build GitHub Pages static playtest
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
        run: node scripts/build-github-pages.mjs
      - name: Install isolated browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.56.1
          npx playwright install --with-deps chromium
      - name: Run GitHub Pages browser smoke
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
        run: node scripts/github-pages-smoke.mjs
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-playtest-evidence
          path: pages-evidence
          if-no-files-found: warn
          retention-days: 7
      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
