name: GitHub Pages One-Time Release c6772697

on:
  push:
    branches:
      - ops/github-pages-release-c6772697

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact main release SHA
        uses: actions/checkout@v4
        with:
          ref: c6772697bcf71cfd5682ca30a91d118cd9725dc9
          persist-credentials: false
          fetch-depth: 1
      - name: Verify source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "c6772697bcf71cfd5682ca30a91d118cd9725dc9"
          test "$(git status --porcelain)" = ""
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Build production application
        run: npm run build
      - name: Build GitHub Pages static playtest
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
          GITHUB_SHA: c6772697bcf71cfd5682ca30a91d118cd9725dc9
        run: node scripts/build-github-pages.mjs
      - name: Install isolated browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.56.1
          npx playwright install --with-deps chromium
      - name: Run GitHub Pages browser smoke
        env:
          GITHUB_PAGES_BASE_PATH: /Zombieee
        run: node scripts/github-pages-smoke.mjs
      - name: Upload browser evidence
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-release-c6772697-evidence
          path: pages-evidence
          if-no-files-found: error
          retention-days: 7
      - name: Ensure GitHub Pages uses Actions
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                build_type: 'workflow',
              });
              core.info('GitHub Pages already exists and uses workflow builds.');
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                build_type: 'workflow',
              });
              core.info('GitHub Pages was created with workflow builds.');
            }
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Report deployment to Issue 29
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        shell: bash
        run: |
          if [ -z "$PAGE_URL" ]; then
            PAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          {
            echo "## GitHub Pages試遊版 deployment結果"
            echo
            echo "- release SHA: \`c6772697bcf71cfd5682ca30a91d118cd9725dc9\`"
            echo "- build: \`$BUILD_RESULT\`"
            echo "- deploy: \`$DEPLOY_RESULT\`"
            echo "- URL: $PAGE_URL"
            echo "- workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/pages-deployment-report.md
          gh issue comment 29 --body-file /tmp/pages-deployment-report.md
